spring.application.name=fleet-gps-service

# DataSource
# Values are overridden at runtime by docker-compose environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/fleetgps}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fleetuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fleetpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Speed Violation
app.speed.violation-threshold-kmh=100

# Cleanup Scheduler
app.cleanup.retention-days=30
app.cleanup.cron=0 0 2 * * *

